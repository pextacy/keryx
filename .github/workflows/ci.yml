name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (rail + agent + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Circle OOAK is adopted in-tree (apps/circle-ooak) and used directly by /workflow/*.
          pip install -e apps/circle-ooak
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy shared rail agent registry
      - name: Test (pytest)
        run: pytest

  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install deps (forge-std)
        run: forge install foundry-rs/forge-std --no-git
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv

  contracts-vendor:
    name: Adopted contracts (recibo + refund-protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Bootstrap deps + build each adopted Foundry project
        run: make contracts-vendor

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Build (typechecks + generates route types)
        run: pnpm build
